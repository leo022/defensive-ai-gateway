<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Defensive AI Gateway alert processing flow</title>
  <desc id="desc">A seven-step flow from raw alert ingestion through normalization, memory retrieval, agent analysis, case creation, audit, and dashboard review.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .accent { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 18; }
      .guard { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 18; }
      .store { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 18; }
      .title { font: 700 40px Arial, sans-serif; fill: #0f172a; }
      .step { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 17px Arial, sans-serif; fill: #334155; }
      .num { font: 700 26px Arial, sans-serif; fill: #ffffff; }
      .bubble { fill: #2563eb; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="720"/>
  <text class="title" x="80" y="82">End-to-end alert processing flow</text>

  <rect class="card" x="80" y="150" width="190" height="210"/>
  <circle class="bubble" cx="120" cy="195" r="24"/><text class="num" x="112" y="204">1</text>
  <text class="step" x="105" y="245">Raw alert</text>
  <text class="body" x="105" y="285">HIPS, RASP,</text>
  <text class="body" x="105" y="310">NDR, WAF, SIEM</text>

  <rect class="guard" x="330" y="150" width="210" height="210"/>
  <circle class="bubble" cx="370" cy="195" r="24"/><text class="num" x="362" y="204">2</text>
  <text class="step" x="355" y="245">Policy gate</text>
  <text class="body" x="355" y="285">Redact sensitive</text>
  <text class="body" x="355" y="310">fields before prompt</text>

  <rect class="accent" x="600" y="150" width="220" height="210"/>
  <circle class="bubble" cx="640" cy="195" r="24"/><text class="num" x="632" y="204">3</text>
  <text class="step" x="625" y="245">Normalize</text>
  <text class="body" x="625" y="285">Extract entities,</text>
  <text class="body" x="625" y="310">evidence and tags</text>

  <rect class="card" x="880" y="150" width="230" height="210"/>
  <circle class="bubble" cx="920" cy="195" r="24"/><text class="num" x="912" y="204">4</text>
  <text class="step" x="905" y="245">Route agent</text>
  <text class="body" x="905" y="285">Select WAF, HIPS,</text>
  <text class="body" x="905" y="310">RASP, NDR or SIEM</text>

  <rect class="store" x="1180" y="150" width="260" height="210"/>
  <circle class="bubble" cx="1220" cy="195" r="24"/><text class="num" x="1212" y="204">5</text>
  <text class="step" x="1205" y="245">Retrieve context</text>
  <text class="body" x="1205" y="285">Case memory, asset</text>
  <text class="body" x="1205" y="310">profile, org playbooks</text>

  <rect class="accent" x="330" y="440" width="280" height="180"/>
  <circle class="bubble" cx="370" cy="485" r="24"/><text class="num" x="362" y="494">6</text>
  <text class="step" x="355" y="535">Analyze</text>
  <text class="body" x="355" y="575">LLM or deterministic</text>
  <text class="body" x="355" y="600">local analyzer</text>

  <rect class="guard" x="700" y="440" width="300" height="180"/>
  <circle class="bubble" cx="740" cy="485" r="24"/><text class="num" x="732" y="494">7</text>
  <text class="step" x="725" y="535">Persist and review</text>
  <text class="body" x="725" y="575">Case, agent run, audit,</text>
  <text class="body" x="725" y="600">dashboard cards</text>

  <path class="arrow" d="M270 255 L330 255"/>
  <path class="arrow" d="M540 255 L600 255"/>
  <path class="arrow" d="M820 255 L880 255"/>
  <path class="arrow" d="M1110 255 L1180 255"/>
  <path class="arrow" d="M1310 360 C1310 420 570 390 505 440"/>
  <path class="arrow" d="M610 530 L700 530"/>
</svg>
