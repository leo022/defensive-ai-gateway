apiVersion: v1
kind: Namespace
metadata:
  name: defensive-ai-gateway
---
# Empty values provide zero-configuration startup. Supplying
# DEFENSIVE_AI_API_TOKEN later immediately enables Bearer authentication.
apiVersion: v1
kind: Secret
metadata:
  name: defensive-ai-gateway-secrets
  namespace: defensive-ai-gateway
type: Opaque
stringData:
  DEFENSIVE_AI_LLM_API_KEY: ""
  DEFENSIVE_AI_API_TOKEN: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: defensive-ai-gateway-data
  namespace: defensive-ai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: defensive-ai-gateway
  namespace: defensive-ai-gateway
spec:
  replicas: 1
  # hostPort cannot run old and new pods concurrently on a single-node k3s host.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: defensive-ai-gateway
  template:
    metadata:
      labels:
        app: defensive-ai-gateway
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: defensive-ai-gateway:latest
          # The deployment bundle imports this image into containerd. Never try
          # an external registry in an air-gapped environment.
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: defensive-ai-gateway-secrets
          ports:
            - name: http
              containerPort: 8080
              hostPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: defensive-ai-gateway-data
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
# ClusterIP remains available to in-cluster collectors. hostPort above exposes
# the same application directly at http://<k3s-node-ip>:8080.
apiVersion: v1
kind: Service
metadata:
  name: defensive-ai-gateway
  namespace: defensive-ai-gateway
spec:
  type: ClusterIP
  selector:
    app: defensive-ai-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
