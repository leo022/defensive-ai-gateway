apiVersion: v1
kind: Namespace
metadata:
  name: defensive-ai-gateway
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: defensive-ai-gateway-data
  namespace: defensive-ai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: defensive-ai-gateway
  namespace: defensive-ai-gateway
spec:
  replicas: 1
  # SQLite permits only one gateway writer. A pre-upgrade backup plus Recreate
  # avoids overlapping writers; the installer restores this revision on failure.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: defensive-ai-gateway
  template:
    metadata:
      labels:
        app: defensive-ai-gateway
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          # Packaging replaces this marker with a digest or image-ID-derived tag.
          # The installer refuses refs that do not carry a sha256 content identity.
          image: "@@GATEWAY_IMAGE@@"
          # The deployment bundle imports this image into containerd. Never try
          # an external registry in an air-gapped environment.
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: defensive-ai-gateway-secrets
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/live
              port: http
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: "2"
              memory: 2Gi
              ephemeral-storage: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: defensive-ai-gateway-data
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
# ClusterIP is the only base exposure. Production adds a TLS Ingress with source
# allowlisting; explicit demo mode applies a separate hostPort patch.
apiVersion: v1
kind: Service
metadata:
  name: defensive-ai-gateway
  namespace: defensive-ai-gateway
spec:
  type: ClusterIP
  selector:
    app: defensive-ai-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
