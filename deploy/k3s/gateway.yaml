apiVersion: v1
kind: Namespace
metadata:
  name: defensive-ai-gateway
---
apiVersion: v1
kind: Secret
metadata:
  name: defensive-ai-gateway-secrets
  namespace: defensive-ai-gateway
type: Opaque
stringData:
  DEFENSIVE_AI_LLM_API_KEY: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: defensive-ai-gateway-config
  namespace: defensive-ai-gateway
data:
  prod.yaml: |
    server:
      host: "0.0.0.0"
      port: 8080
    database:
      path: "/var/lib/defensive-ai-gateway/gateway.db"
    llm:
      provider: "gateway"
      endpoint: "https://llm-gateway.internal.example/v1/security/analyze"
      api_key_env: "DEFENSIVE_AI_LLM_API_KEY"
      model: "enterprise-sec-analyst"
      timeout_seconds: 30
    policy:
      mode: "read_only"
      max_prompt_chars: 12000
      require_approval_for: [block, isolate, change_policy, disable_account]
      redact_fields: [password, token, cookie, authorization, customer_id, id_card, phone, email, session]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: defensive-ai-gateway-data
  namespace: defensive-ai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: defensive-ai-gateway
  namespace: defensive-ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: defensive-ai-gateway
  template:
    metadata:
      labels:
        app: defensive-ai-gateway
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: gateway
          image: defensive-ai-gateway:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "defensive_ai_gateway"]
          args: ["--config", "/etc/defensive-ai-gateway/prod.yaml"]
          envFrom:
            - secretRef:
                name: defensive-ai-gateway-secrets
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/defensive-ai-gateway
              readOnly: true
            - name: data
              mountPath: /var/lib/defensive-ai-gateway
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
      volumes:
        - name: config
          configMap:
            name: defensive-ai-gateway-config
        - name: data
          persistentVolumeClaim:
            claimName: defensive-ai-gateway-data
---
apiVersion: v1
kind: Service
metadata:
  name: defensive-ai-gateway
  namespace: defensive-ai-gateway
spec:
  type: ClusterIP
  selector:
    app: defensive-ai-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: defensive-ai-gateway
  namespace: defensive-ai-gateway
spec:
  rules:
    - host: defensive-ai-gateway.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: defensive-ai-gateway
                port:
                  number: 8080
