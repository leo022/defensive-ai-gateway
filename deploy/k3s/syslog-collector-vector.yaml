apiVersion: v1
kind: ConfigMap
metadata:
  name: syslog-collector-vector-config
  namespace: defensive-ai-gateway
data:
  vector.toml: |
    [api]
    enabled = false

    [sources.syslog_udp]
    type = "syslog"
    address = "0.0.0.0:1514"
    mode = "udp"

    [sources.syslog_tcp]
    type = "syslog"
    address = "0.0.0.0:1514"
    mode = "tcp"

    # 1) 来源识别 + 按已保存的 mapping profile 分类。
    #    识别优先级：syslog appname 标签（运维侧给每类设备打的标签）> 日志内容指纹。
    #    识别到 product 后映射到 Dashboard「日志自动适配」中已保存的 profile_id；
    #    gateway_profile 为空表示未配置 profile，走下方 standard 路径（collector 侧归一化）。
    [transforms.classify_source]
    type = "remap"
    inputs = ["syslog_udp", "syslog_tcp"]
    source = '''
    raw = .
    structured = parse_json(.message) ?? {}
    if !is_object(structured) {
      structured = {}
    }

    appname = downcase(to_string(.appname) ?? "")
    product = downcase(to_string(structured.product) ?? to_string(structured.event.product) ?? "")

    # cloudrasp 原生 RASP 指纹：data_type=attack_event
    if product == "" && to_string(structured.data_type) == "attack_event" {
      product = "rasp"
    }
    # appname 标签兜底（运维侧把设备 syslog appname 设为 rasp/waf/hips/ndr/siem）
    if product == "" && (appname == "rasp" || appname == "waf" || appname == "hips" || appname == "ndr" || appname == "siem") {
      product = appname
    }

    # product → 已保存的 profile_id。RASP 默认复用内置 demo-rasp-json（开箱即用）。
    # 其它产品需先在 Dashboard 保存对应 profile，再取消注释相应分支；
    # 未取消注释的产品会落入 standard 路径，由 collector 侧归一化，不会被丢弃。
    gateway_profile = ""
    if product == "rasp" {
      gateway_profile = "demo-rasp-json"
    }
    # else if product == "waf" { gateway_profile = "waf-syslog-json" }
    # else if product == "hips" { gateway_profile = "hips-syslog-json" }
    # else if product == "ndr" { gateway_profile = "ndr-syslog-json" }
    # else if product == "siem" { gateway_profile = "siem-syslog-json" }

    .structured = structured
    .raw = raw
    .appname = appname
    .product = product
    .gateway_profile = gateway_profile
    '''

    # 2) 路由分流：有 profile 的走网关 profile 解析；其余走 collector 侧归一化。
    [transforms.route_by_profile]
    type = "route"
    inputs = ["classify_source"]
    route.profiled = '.gateway_profile != ""'
    route.standard = '.gateway_profile == ""'

    # 3a) profiled：透传原始结构化日志 {"log": ...}，URI 用 ?profile=<id> 指定网关侧 profile。
    #     网关 alert_from_payload 检测到 profile_id 后只读取 body 中的 "log" 字段做语义映射。
    [transforms.shape_profiled]
    type = "remap"
    inputs = ["route_by_profile.profiled"]
    source = '''
    . = {
      "log": .structured,
      "_gateway_profile": .gateway_profile
    }
    '''

    [sinks.gateway_profiled]
    type = "http"
    inputs = ["shape_profiled"]
    uri = "http://defensive-ai-gateway:8080/api/alerts?profile={{ _gateway_profile }}"
    method = "post"
    request.headers.Content-Type = "application/json"
    encoding.codec = "json"

    # 3b) standard：未配置 profile 的来源，由 collector 归一化为标准告警 JSON 后直送网关。
    [transforms.shape_standard]
    type = "remap"
    inputs = ["route_by_profile.standard"]
    source = '''
    structured = .structured
    raw = .raw
    message_text = to_string(.message) ?? ""
    host_text = to_string(.hostname) ?? ""
    source_name = to_string(.appname) ?? host_text
    if source_name == "" {
      source_name = "syslog"
    }

    product = .product
    if product != "hips" && product != "rasp" && product != "ndr" && product != "waf" && product != "siem" {
      product = "siem"
    }

    event_type = to_string(structured.event_type) ?? to_string(structured.event.type) ?? to_string(structured.type) ?? to_string(.msgid) ?? "syslog_event"
    severity = downcase(to_string(structured.severity) ?? to_string(structured.level) ?? to_string(.severity) ?? "medium")
    if severity == "emerg" || severity == "alert" || severity == "crit" || severity == "critical" {
      severity = "critical"
    } else if severity == "err" || severity == "error" || severity == "warning" || severity == "warn" {
      severity = "high"
    } else if severity == "notice" || severity == "info" || severity == "debug" {
      severity = "low"
    } else if severity != "critical" && severity != "high" && severity != "medium" && severity != "low" {
      severity = "medium"
    }

    timestamp_text = format_timestamp(.timestamp, format: "%+") ?? to_string(now())
    alert_id = to_string(structured.alert_id) ?? to_string(structured.id) ?? ""
    if alert_id == "" {
      alert_id = source_name + ":" + event_type + ":" + timestamp_text
    }

    payload = structured
    payload.syslog = raw
    payload.syslog_message = message_text
    payload.syslog_hostname = host_text
    payload.syslog_appname = source_name
    payload.syslog_collector = "vector"
    payload.syslog_received_at = to_string(now())

    . = {
      "alert_id": alert_id,
      "source": source_name,
      "product": product,
      "event_type": event_type,
      "severity": severity,
      "timestamp": timestamp_text,
      "payload": payload
    }
    '''

    [sinks.gateway_standard]
    type = "http"
    inputs = ["shape_standard"]
    uri = "http://defensive-ai-gateway:8080/api/alerts"
    method = "post"
    request.headers.Content-Type = "application/json"
    encoding.codec = "json"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syslog-collector-vector
  namespace: defensive-ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syslog-collector-vector
  template:
    metadata:
      labels:
        app: syslog-collector-vector
    spec:
      containers:
        - name: vector
          image: timberio/vector:0.39.0-alpine
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/vector/vector.toml"]
          ports:
            - name: syslog-udp
              containerPort: 1514
              protocol: UDP
            - name: syslog-tcp
              containerPort: 1514
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
      volumes:
        - name: config
          configMap:
            name: syslog-collector-vector-config
---
apiVersion: v1
kind: Service
metadata:
  name: syslog-collector
  namespace: defensive-ai-gateway
spec:
  type: LoadBalancer
  selector:
    app: syslog-collector-vector
  ports:
    - name: syslog-udp
      port: 1514
      targetPort: syslog-udp
      protocol: UDP
    - name: syslog-tcp
      port: 1514
      targetPort: syslog-tcp
      protocol: TCP
