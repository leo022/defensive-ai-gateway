apiVersion: v1
kind: ConfigMap
metadata:
  name: syslog-collector-vector-config
  namespace: defensive-ai-gateway
data:
  vector.toml: |
    data_dir = "/var/lib/vector"

    [api]
    enabled = true
    address = "0.0.0.0:8686"

    [sources.syslog_waf_udp]
    type = "syslog"
    address = "0.0.0.0:15140"
    mode = "udp"

    [sources.syslog_waf_tcp]
    type = "syslog"
    address = "0.0.0.0:15140"
    mode = "tcp"

    [sources.syslog_hips_udp]
    type = "syslog"
    address = "0.0.0.0:15141"
    mode = "udp"

    [sources.syslog_hips_tcp]
    type = "syslog"
    address = "0.0.0.0:15141"
    mode = "tcp"

    [sources.syslog_ndr_udp]
    type = "syslog"
    address = "0.0.0.0:15142"
    mode = "udp"

    [sources.syslog_ndr_tcp]
    type = "syslog"
    address = "0.0.0.0:15142"
    mode = "tcp"

    [sources.syslog_rasp_udp]
    type = "syslog"
    address = "0.0.0.0:15143"
    mode = "udp"

    [sources.syslog_rasp_tcp]
    type = "syslog"
    address = "0.0.0.0:15143"
    mode = "tcp"

    [sources.syslog_siem_udp]
    type = "syslog"
    address = "0.0.0.0:15144"
    mode = "udp"

    [sources.syslog_siem_tcp]
    type = "syslog"
    address = "0.0.0.0:15144"
    mode = "tcp"

    [transforms.tag_waf_syslog]
    type = "remap"
    inputs = ["syslog_waf_udp", "syslog_waf_tcp"]
    source = '.port_product = "waf"; .destination_port = 15140'

    [transforms.tag_hips_syslog]
    type = "remap"
    inputs = ["syslog_hips_udp", "syslog_hips_tcp"]
    source = '.port_product = "hips"; .destination_port = 15141'

    [transforms.tag_ndr_syslog]
    type = "remap"
    inputs = ["syslog_ndr_udp", "syslog_ndr_tcp"]
    source = '.port_product = "ndr"; .destination_port = 15142'

    [transforms.tag_rasp_syslog]
    type = "remap"
    inputs = ["syslog_rasp_udp", "syslog_rasp_tcp"]
    source = '.port_product = "rasp"; .destination_port = 15143'

    [transforms.tag_siem_syslog]
    type = "remap"
    inputs = ["syslog_siem_udp", "syslog_siem_tcp"]
    source = '.port_product = "siem"; .destination_port = 15144'

    # 1) 来源识别 + 按已保存的 mapping profile 分类。
    #    识别优先级：目的端口标签 > syslog appname 标签 > 日志内容指纹。
    #    识别到 product 后映射到 Dashboard「日志自动适配」中已保存的 profile_id；
    #    gateway_profile 为空表示未配置 profile，走下方 standard 路径（collector 侧归一化）。
    [transforms.classify_source]
    type = "remap"
    inputs = ["tag_waf_syslog", "tag_hips_syslog", "tag_ndr_syslog", "tag_rasp_syslog", "tag_siem_syslog"]
    source = '''
    raw = .
    structured = parse_json(.message) ?? {}
    if !is_object(structured) {
      structured = {}
    }

    appname = downcase(to_string(.appname) ?? "")
    port_product = downcase(to_string(.port_product) ?? "")
    product = port_product
    if product == "" {
      product = downcase(to_string(structured.product) ?? to_string(structured.event.product) ?? "")
    }

    # cloudrasp 原生 RASP 指纹：data_type=attack_event
    if product == "" && to_string(structured.data_type) == "attack_event" {
      product = "rasp"
    }
    # appname 标签兜底（运维侧把设备 syslog appname 设为 rasp/waf/hips/ndr/siem）
    if product == "" && (appname == "rasp" || appname == "waf" || appname == "hips" || appname == "ndr" || appname == "siem") {
      product = appname
    }

    # product → 网关内置的五产品自动 profile。未识别 product 时才走
    # standard 路径，由 collector 侧保守归一化。
    gateway_profile = ""
    if product == "waf" { gateway_profile = "auto-waf-json" }
    else if product == "hips" { gateway_profile = "auto-hips-json" }
    else if product == "ndr" { gateway_profile = "auto-ndr-json" }
    else if product == "rasp" { gateway_profile = "auto-rasp-json" }
    else if product == "siem" { gateway_profile = "auto-siem-json" }

    .structured = structured
    .raw = raw
    .appname = appname
    .product = product
    .gateway_profile = gateway_profile
    .route_envelope = {
      "collector": "vector",
      "destination_port": .destination_port,
      "product": product,
      "hostname": to_string(.hostname) ?? "",
      "appname": appname,
      "source_ip": to_string(.source_ip) ?? "",
      "raw_message": to_string(.message) ?? "",
      "received_at": to_string(now())
    }
    '''

    # 2) 路由分流：有 profile 的走网关 profile 解析；其余走 collector 侧归一化。
    [transforms.route_by_profile]
    type = "route"
    inputs = ["classify_source"]
    route.profiled = '.gateway_profile != ""'
    route.standard = '.gateway_profile == ""'

    # 3a) profiled：透传原始结构化日志 {"log": ...}，URI 用 ?profile=<id> 指定网关侧 profile。
    #     网关 alert_from_payload 检测到 profile_id 后只读取 body 中的 "log" 字段做语义映射。
    [transforms.shape_profiled]
    type = "remap"
    inputs = ["route_by_profile.profiled"]
    source = '''
    structured = .structured
    envelope = .route_envelope
    envelope.route_reason = "port_profile"
    structured._syslog_envelope = envelope
    . = {
      "log": structured,
      "_gateway_profile": .gateway_profile,
      "syslog_route": envelope
    }
    '''

    [sinks.gateway_profiled]
    type = "http"
    inputs = ["shape_profiled"]
    uri = "http://defensive-ai-gateway:8080/api/alerts?profile={{ _gateway_profile }}"
    method = "post"
    request.headers.Content-Type = "application/json"
    # Collector is deliberately limited to the ingest role.
    request.headers.Authorization = "Bearer ${DEFENSIVE_AI_INGEST_TOKEN}"
    encoding.codec = "json"
    acknowledgements.enabled = true

    # /api/alerts accepts one JSON object per request. Vector's HTTP sink batches
    # by default, which can emit NDJSON and make a burst retry forever as 400.
    [sinks.gateway_profiled.batch]
    max_events = 1

    [sinks.gateway_profiled.buffer]
    type = "disk"
    max_size = 536870912
    when_full = "block"

    # 3b) standard：未配置 profile 的来源，由 collector 归一化为标准告警 JSON 后直送网关。
    [transforms.shape_standard]
    type = "remap"
    inputs = ["route_by_profile.standard"]
    source = '''
    structured = .structured
    raw = .raw
    message_text = to_string(.message) ?? ""
    host_text = to_string(.hostname) ?? ""
    source_name = to_string(.appname) ?? host_text
    if source_name == "" {
      source_name = "syslog"
    }

    product = .product
    if product != "hips" && product != "rasp" && product != "ndr" && product != "waf" && product != "siem" {
      product = "siem"
    }

    event_type = to_string(structured.event_type) ?? to_string(structured.event.type) ?? to_string(structured.type) ?? to_string(.msgid) ?? "syslog_event"
    severity = downcase(to_string(structured.severity) ?? to_string(structured.level) ?? to_string(.severity) ?? "medium")
    if severity == "emerg" || severity == "alert" || severity == "crit" || severity == "critical" {
      severity = "critical"
    } else if severity == "err" || severity == "error" || severity == "warning" || severity == "warn" {
      severity = "high"
    } else if severity == "notice" || severity == "info" || severity == "debug" {
      severity = "low"
    } else if severity != "critical" && severity != "high" && severity != "medium" && severity != "low" {
      severity = "medium"
    }

    timestamp_text = format_timestamp(.timestamp, format: "%+") ?? to_string(now())
    alert_id = to_string(structured.alert_id) ?? to_string(structured.id) ?? ""
    if alert_id == "" {
      alert_id = source_name + ":" + event_type + ":" + timestamp_text
    }

    payload = structured
    payload.syslog = raw
    payload.syslog_message = message_text
    payload.syslog_hostname = host_text
    payload.syslog_appname = source_name
    payload.syslog_collector = "vector"
    payload.syslog_received_at = to_string(now())
    envelope = .route_envelope
    envelope.route_reason = "port_standard"
    payload.syslog_route = envelope

    . = {
      "alert_id": alert_id,
      "source": source_name,
      "product": product,
      "event_type": event_type,
      "severity": severity,
      "timestamp": timestamp_text,
      "payload": payload
    }
    '''

    [sinks.gateway_standard]
    type = "http"
    inputs = ["shape_standard"]
    uri = "http://defensive-ai-gateway:8080/api/alerts"
    method = "post"
    request.headers.Content-Type = "application/json"
    request.headers.Authorization = "Bearer ${DEFENSIVE_AI_INGEST_TOKEN}"
    encoding.codec = "json"
    acknowledgements.enabled = true

    [sinks.gateway_standard.batch]
    max_events = 1

    [sinks.gateway_standard.buffer]
    type = "disk"
    max_size = 536870912
    when_full = "block"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: syslog-collector-vector-data
  namespace: defensive-ai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syslog-collector-vector
  namespace: defensive-ai-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: syslog-collector-vector
  template:
    metadata:
      labels:
        app: syslog-collector-vector
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vector
          # Replaced by the offline packaging step with a digest-pinned image.
          image: "@@VECTOR_IMAGE@@"
          imagePullPolicy: Never
          args: ["--config", "/etc/vector/vector.toml"]
          env:
            - name: DEFENSIVE_AI_INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: defensive-ai-gateway-secrets
                  key: DEFENSIVE_AI_INGEST_TOKEN
          ports:
            - name: syslog-udp
              containerPort: 15140
              protocol: UDP
            - name: syslog-tcp
              containerPort: 15140
              protocol: TCP
            - name: hips-udp
              containerPort: 15141
              protocol: UDP
            - name: hips-tcp
              containerPort: 15141
              protocol: TCP
            - name: ndr-udp
              containerPort: 15142
              protocol: UDP
            - name: ndr-tcp
              containerPort: 15142
              protocol: TCP
            - name: rasp-udp
              containerPort: 15143
              protocol: UDP
            - name: rasp-tcp
              containerPort: 15143
              protocol: TCP
            - name: siem-udp
              containerPort: 15144
              protocol: UDP
            - name: siem-tcp
              containerPort: 15144
              protocol: TCP
            - name: vector-api
              containerPort: 8686
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: vector-api
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: vector-api
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /var/lib/vector
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: syslog-collector-vector-config
        - name: data
          persistentVolumeClaim:
            claimName: syslog-collector-vector-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: syslog-collector
  namespace: defensive-ai-gateway
spec:
  type: LoadBalancer
  # Preserve device addresses so both the Service allowlist and the optional
  # production NetworkPolicy evaluate the real source rather than a node SNAT.
  externalTrafficPolicy: Local
  # Rendered by the installer; empty/global ranges are rejected in production.
  loadBalancerSourceRanges: "@@SYSLOG_SOURCE_CIDRS_JSON@@"
  selector:
    app: syslog-collector-vector
  ports:
    - name: waf-udp
      port: 15140
      targetPort: syslog-udp
      protocol: UDP
    - name: waf-tcp
      port: 15140
      targetPort: syslog-tcp
      protocol: TCP
    - name: hips-udp
      port: 15141
      targetPort: hips-udp
      protocol: UDP
    - name: hips-tcp
      port: 15141
      targetPort: hips-tcp
      protocol: TCP
    - name: ndr-udp
      port: 15142
      targetPort: ndr-udp
      protocol: UDP
    - name: ndr-tcp
      port: 15142
      targetPort: ndr-tcp
      protocol: TCP
    - name: rasp-udp
      port: 15143
      targetPort: rasp-udp
      protocol: UDP
    - name: rasp-tcp
      port: 15143
      targetPort: rasp-tcp
      protocol: TCP
    - name: siem-udp
      port: 15144
      targetPort: siem-udp
      protocol: UDP
    - name: siem-tcp
      port: 15144
      targetPort: siem-tcp
      protocol: TCP
